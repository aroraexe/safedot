<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFEDOT Real-Time GPS Tracker</title>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet.js Map CSS & JS (Free, Open-Source) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #6366f1;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --success-color: #10b981;
            --danger-color: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Layout */
        #container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        #map {
            flex: 1;
            width: 100%;
            z-index: 1;
        }

        /* Glassmorphism Control Panels */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        /* Top Header Panel */
        header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: auto;
        }

        .logo-section h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(to right, #a5b4fc, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pulse-indicator {
            width: 10px;
            height: 10px;
            background-color: var(--success-color);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        /* Bottom Info & Stats Panel */
        #info-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            text-align: center;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Device Prompt Overlay */
        #prompt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.9);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: opacity 0.5s ease;
        }

        .prompt-card {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        }

        .prompt-card h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .prompt-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .prompt-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 14px 20px;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            text-align: center;
        }

        .prompt-input:focus {
            border-color: var(--accent-color);
        }

        .leaflet-container {
            background: #0b0f19 !important;
        }

        .leaflet-tile {
            filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3);
        }

        .leaflet-control-zoom {
            border: 1px solid var(--border-color) !important;
            box-shadow: none !important;
            border-radius: 10px !important;
            overflow: hidden;
        }

        .leaflet-control-zoom-in, .leaflet-control-zoom-out {
            background: var(--card-bg) !important;
            color: var(--text-primary) !important;
            border-bottom: 1px solid var(--border-color) !important;
            backdrop-filter: blur(10px);
        }

        .leaflet-control-zoom-in:hover, .leaflet-control-zoom-out:hover {
            background: rgba(255, 255, 255, 0.1) !important;
        }

        .custom-popup .leaflet-popup-content-wrapper {
            background: var(--bg-color);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 5px;
        }

        .custom-popup .leaflet-popup-tip {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

    <!-- Prompt Overlay for Tracker ID Input -->
    <div id="prompt-overlay" style="display: none;">
        <div class="prompt-card">
            <h2>SAFEDOT Live Map</h2>
            <p>Please enter your Unique Tracker ID below to instantly link your emergency device.</p>
            <div class="input-group">
                <input type="text" id="tracker-id-input" class="prompt-input" placeholder="e.g., safedot-30583120691c">
            </div>
            <button class="btn" onclick="submitTrackerId()">Start Live Tracking</button>
        </div>
    </div>

    <!-- Main Container -->
    <div id="container">
        <!-- Floating Header -->
        <header class="glass-panel">
            <div class="logo-section">
                <h1>🛰️ SAFEDOT <span class="pulse-indicator" id="status-pulse"></span></h1>
            </div>
            <div style="font-size: 0.85rem; color: var(--text-secondary);" id="connection-status">
                Initializing...
            </div>
        </header>

        <!-- Leaflet Map Container -->
        <div id="map"></div>

        <!-- Floating Info Panel -->
        <div id="info-panel" class="glass-panel">
            <div style="font-weight: 600; font-size: 1.1rem; display:flex; justify-content:space-between; align-items:center;">
                <span id="display-tracker-id">Device: Connecting</span>
                <span id="last-update" style="font-size: 0.75rem; color: var(--text-secondary);">Never</span>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Latitude</div>
                    <div class="stat-value" id="stat-lat">--.------</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Longitude</div>
                    <div class="stat-value" id="stat-lon">--.------</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Altitude</div>
                    <div class="stat-value" id="stat-alt">--m</div>
                </div>
            </div>
            
            <button class="btn" onclick="centerOnTarget()">
                🎯 Center Map on Tracker
            </button>
        </div>
    </div>

    <script>
        let map;
        let marker;
        let pathLine;
        let coordinatesHistory = [];
        let trackerId = "";
        let isFirstLoad = true;
        let trackerWorker;

        // Custom Configuration
        const FIREBASE_HOST = "safedot-73b43-default-rtdb.firebaseio.com";

        // Initialize App on DOM Content Loaded
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const idParam = urlParams.get('id');
            const isLocal = window.location.hostname === "192.168.4.1" || window.location.hostname === "localhost";

            if (isLocal) {
                trackerId = "local-ap";
                startTracking(true);
            } else if (idParam) {
                trackerId = idParam.trim();
                startTracking(false);
            } else {
                document.getElementById("prompt-overlay").style.display = "flex";
            }
        });

        function submitTrackerId() {
            const inputVal = document.getElementById("tracker-id-input").value.trim();
            if (inputVal) {
                trackerId = inputVal;
                document.getElementById("prompt-overlay").style.opacity = 0;
                setTimeout(() => {
                    document.getElementById("prompt-overlay").style.display = "none";
                }, 500);
                startTracking(false);
            }
        }

        function startTracking(isLocal) {
            document.getElementById("display-tracker-id").innerText = trackerId.toUpperCase();
            
            // Initialize Leaflet Map (Centered on default coordinates first)
            map = L.map('map', {
                zoomControl: true,
                attributionControl: false
            }).setView([20.5937, 78.9629], 5); // Center of India default

            // Load Premium Dark Map Tiles (CartoDB Dark Matter - Free and Keyless)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 20
            }).addTo(map);

            // Initialize Trail Polyline
            pathLine = L.polyline([], {
                color: '#6366f1',
                weight: 4,
                opacity: 0.8,
                dashArray: '5, 8'
            }).addTo(map);

            if (isLocal) {
                // If running locally, fall back to standard rapid AJAX polling to ESP32 API
                setInterval(fetchLocalCoordinates, 1000);
            } else {
                // Initialize high-speed, non-blocking Multi-threaded Web Worker & WebSocket (Server Sent Events)
                initWebSocketWorker();
            }
        }

        // Multithreaded Web Worker for 0% Main-Thread UI stuttering
        function initWebSocketWorker() {
            const workerCode = `
                let eventSource = null;
                let isConnected = false;

                self.onmessage = function(e) {
                    if (e.data.type === 'START') {
                        connectToFirebase(e.data.host, e.data.trackerId);
                    }
                };

                function connectToFirebase(host, id) {
                    if (eventSource) eventSource.close();
                    
                    const url = "https://" + host + "/trackers/" + id + ".json?auth=j5M7TpiXTb6rYaItUnFIwtXE2aIJnkdSKQQ6dkNr";
                    eventSource = new EventSource(url);
                    
                    eventSource.addEventListener('put', function(event) {
                        const data = JSON.parse(event.data);
                        if (data && data.data) {
                            self.postMessage({ type: 'UPDATE', coordinates: data.data });
                        }
                    });

                    eventSource.addEventListener('patch', function(event) {
                        const data = JSON.parse(event.data);
                        if (data && data.data) {
                            self.postMessage({ type: 'UPDATE', coordinates: data.data });
                        }
                    });

                    eventSource.onopen = function() {
                        self.postMessage({ type: 'STATUS', status: 'connected' });
                    };

                    eventSource.onerror = function() {
                        self.postMessage({ type: 'STATUS', status: 'error' });
                    };
                }
            `;

            const blob = new Blob([workerCode], { type: 'application/javascript' });
            const workerUrl = URL.createObjectURL(blob);
            trackerWorker = new Worker(workerUrl);

            // Start background thread socket listening
            trackerWorker.postMessage({
                type: 'START',
                host: FIREBASE_HOST,
                trackerId: trackerId
            });

            // Handle incoming coordinate packets from background Web Worker thread (Message Queue)
            trackerWorker.onmessage = function(e) {
                const statusPulse = document.getElementById("status-pulse");
                const connectionStatus = document.getElementById("connection-status");

                if (e.data.type === 'UPDATE') {
                    const coords = e.data.coordinates;
                    const lat = parseFloat(coords.lat);
                    const lon = parseFloat(coords.lon);
                    const alt = parseFloat(coords.alt || 0);
                    const timestamp = new Date();

                    if (!isNaN(lat) && !isNaN(lon) && lat !== 0 && lon !== 0) {
                        updateUIAndMap(lat, lon, alt, timestamp);
                        statusPulse.style.backgroundColor = "#10b981"; // Success green
                        connectionStatus.innerText = "Real-time Live Sync";
                    }
                } else if (e.data.type === 'STATUS') {
                    if (e.data.status === 'connected') {
                        statusPulse.style.backgroundColor = "#10b981";
                        connectionStatus.innerText = "Ready, listening for lock...";
                    } else {
                        statusPulse.style.backgroundColor = "#ef4444"; // Error red
                        connectionStatus.innerText = "Reconnecting...";
                    }
                }
            };
        }

        // Fallback standard rapid polling for offline local AP server mode
        function fetchLocalCoordinates() {
            fetch("/api/location")
                .then(response => response.json())
                .then(data => {
                    const lat = parseFloat(data.lat);
                    const lon = parseFloat(data.lon);
                    const alt = parseFloat(data.alt);
                    if (!isNaN(lat) && !isNaN(lon) && lat !== 0 && lon !== 0) {
                        updateUIAndMap(lat, lon, alt, new Date());
                        document.getElementById("status-pulse").style.backgroundColor = "#10b981";
                        document.getElementById("connection-status").innerText = "Local WiFi Live Sync";
                    }
                })
                .catch(err => {
                    document.getElementById("status-pulse").style.backgroundColor = "#ef4444";
                    document.getElementById("connection-status").innerText = "AP connection lost";
                });
        }

        // Handle Map and Marker Transitions smoothly
        function updateUIAndMap(lat, lon, alt, timestamp) {
            // Update stats
            document.getElementById("stat-lat").innerText = lat.toFixed(6);
            document.getElementById("stat-lon").innerText = lon.toFixed(6);
            document.getElementById("stat-alt").innerText = alt.toFixed(0) + "m";
            document.getElementById("last-update").innerText = timestamp.toLocaleTimeString();

            const newPos = [lat, lon];
            coordinatesHistory.push(newPos);
            
            if (coordinatesHistory.length > 300) coordinatesHistory.shift();
            pathLine.setLatLngs(coordinatesHistory);

            // Update or Create Marker
            if (!marker) {
                const customIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div style="background-color: #6366f1; width: 18px; height: 18px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 15px #6366f1;"></div>`,
                    iconSize: [18, 18],
                    iconAnchor: [9, 9]
                });
                
                marker = L.marker(newPos, { icon: customIcon }).addTo(map);
                marker.bindPopup(`<div class="custom-popup" style="font-weight:600;">📍 SAFEDOT Live Position</div>`, { className: 'custom-popup' });
            } else {
                marker.setLatLng(newPos);
            }

            // Smoothly center the map on coordinates on first load
            if (isFirstLoad) {
                map.setView(newPos, 16);
                isFirstLoad = false;
            }
        }

        function centerOnTarget() {
            if (coordinatesHistory.length > 0) {
                const latestPos = coordinatesHistory[coordinatesHistory.length - 1];
                map.setView(latestPos, 16);
            }
        }
    </script>
</body>
</html>
